<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Inside the Frame: Movement & Debugging in WebXR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-core.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/autoloader/prism-autoloader.min.js"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .slide {
            display: none;
            opacity: 0;
            transform: translateX(50px);
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            overflow-y: auto;
            max-height: 100%;
        }
        
        .slide.active {
            display: flex;
            opacity: 1;
            transform: translateX(0);
        }
        
        .slide-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        /* Mobile optimizations */
        @media (max-width: 768px) {
            .slide-container {
                min-height: calc(100vh - 140px);
                max-height: calc(100vh - 140px);
                margin: 0 8px;
            }
            
            .floating-elements {
                display: none; /* Hide floating elements on mobile for performance */
            }
            
            /* Hide slide indicators on mobile to save space */
            #slide-indicators {
                display: none;
            }
            
            /* Adjust navigation for mobile */
            .mobile-nav {
                position: fixed;
                bottom: 20px;
                left: 50%;
                transform: translateX(-50%);
                z-index: 50;
            }
        }
        
        @media (max-width: 480px) {
            .slide-container {
                min-height: calc(100vh - 120px);
                max-height: calc(100vh - 120px);
                margin: 0 4px;
            }
        }
        
        .code-block {
            background: #2d3748;
            border-radius: 12px;
            overflow: hidden;
            max-height: 400px;
        }
        
        .code-block pre {
            max-height: 350px;
            overflow-y: auto;
            overflow-x: auto;
            font-size: 0.85rem;
        }
        
        /* Mobile code optimizations */
        @media (max-width: 768px) {
            .code-block {
                max-height: 300px;
            }
            
            .code-block pre {
                max-height: 250px;
                font-size: 0.75rem;
                line-height: 1.4;
            }
        }
        
        .gradient-text {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .icon-circle {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .progress-bar {
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s ease;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: all 0.3s ease;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }
        
        .floating-elements {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
            pointer-events: none;
        }
        
        .floating-element {
            position: absolute;
            opacity: 0.1;
            animation: float 20s infinite linear;
        }
        
        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); }
            100% { transform: translateY(-100vh) rotate(360deg); }
        }
        
        .vr-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
        }
        
        .feature-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
        }
        
        .feature-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }
        
        /* Touch-friendly interactions */
        @media (hover: none) and (pointer: coarse) {
            .feature-card:hover {
                transform: none;
                box-shadow: none;
            }
            
            .feature-card:active {
                transform: scale(0.98);
                transition: transform 0.1s ease;
            }
            
            .btn-primary:hover {
                transform: none;
                box-shadow: none;
            }
            
            .btn-primary:active {
                transform: scale(0.95);
            }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- Progress Bar -->

        <div id="progress" class="progress-bar h-full w-0"></div>
    </div>

    <!-- Main Content -->
    <main class="flex-1 flex items-center justify-center p-2 md:p-4">
        <div id="slide-container" class="slide-container w-full max-w-6xl min-h-[600px] max-h-[80vh] rounded-2xl shadow-2xl flex flex-col relative overflow-hidden">
            <!-- Slides will be injected here -->
        </div>
    </main>

    <!-- Navigation -->
    <nav class="fixed bottom-6 left-1/2 transform -translate-x-1/2 z-40 mobile-nav">
        <div class="bg-white/90 backdrop-blur-md rounded-full px-4 md:px-6 py-2 md:py-3 shadow-xl flex items-center space-x-2 md:space-x-4">
            <button id="prev-btn" class="p-2 rounded-full bg-gray-100 hover:bg-gray-200 transition disabled:opacity-50 disabled:cursor-not-allowed touch-manipulation">
                <svg class="w-4 h-4 md:w-5 md:h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
                </svg>
            </button>
            <span id="slide-counter" class="text-xs md:text-sm font-medium text-gray-600 min-w-[60px] md:min-w-[80px] text-center">1 / 22</span>
            <button id="next-btn" class="btn-primary p-2 rounded-full text-white transition touch-manipulation">
                <svg class="w-4 h-4 md:w-5 md:h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                </svg>
            </button>
        </div>
    </nav>

    <!-- Slide Indicator -->
    <div class="fixed right-6 top-1/2 transform -translate-y-1/2 space-y-2 z-40">
        <div id="slide-indicators" class="flex flex-col space-y-1"></div>
    </div>

    <script>
        const slidesData = [
            // Slide 1: Title Slide
            {
                type: 'title',

                subtitle: 'Movement & Debugging',
                description: 'Bringing Your WebXR Worlds to Life',
                facilitator: 'Team Member 2',
                date: '22 August 2025',
                background: 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)'
            },

            // Slide 2: Agenda
            {
                type: 'agenda',
                title: 'What We\'ll Cover Today',
                duration: '90 Minutes',
                parts: [
                    {
                        title: 'Part 1: Movement Logic',
                        time: '40 mins',
                        topics: [
                            'What is VR Locomotion?',

                    {
                        title: 'Part 2: General Debugging',

                    {
                        title: 'Hands-On & Q&A',

            },

            // Slide 3: Quick Recap
            {
                type: 'recap',
                title: 'Quick Recap: Where We Are',
                subtitle: 'Yesterday (Day 1), we learned how to:',
                items: [
                    '🛠️ Set up our development environment',
                    '🎨 Create a basic 3D scene with Three.js',
                    '📦 Import models from Blender and Open Brush',
                    '🚀 Launch a simple "Hello, World!" experience in WebXR'
                ],
                highlight: 'Today, we\'re making it interactive! Our static scene will become a world your users can actually move around in.'
            },

            // Slide 4: Part 1 Title
            {
                type: 'section',
                title: 'Part 1',
                subtitle: 'Movement Logic',

            },

            // Slide 5: What is Movement in VR?
            {
                type: 'concept',
                title: 'What is Movement in VR?',
                subtitle: 'Locomotion',
                definition: 'Locomotion is simply how a user moves through a virtual space.',
                points: [
                    {
                        icon: '🎯',
                        title: 'The Goal',
                        desc: 'Create an experience that is intuitive and comfortable'

                    {
                        icon: '⚠️',

            // Slide 6: Common Types of VR Locomotion
            {
                type: 'comparison',
                title: 'Common Types of VR Locomotion',
                items: [
                    {
                        title: '🚶 Room-Scale',
                        description: 'The user physically walks around in their play space',
                        pros: ['Most immersive', 'No motion sickness'],
                        cons: ['Limited by physical room size']
                    },
                    {
                        title: '📍 Teleportation',
                        description: 'Point to a location and instantly appear there',
                        pros: ['Very comfortable', 'No motion sickness', 'Great for large worlds'],
                        cons: ['Can feel less immersive to some']
                    },
                    {
                        title: '🕹️ Smooth Locomotion',
                        description: 'Using controller joystick to "glide" or "walk"',
                        pros: ['Familiar to gamers', 'Feels continuous'],
                        cons: ['Leading cause of motion sickness if not done well!']
                    }
                ]
            },

            // Slide 7: The Player Rig
            {
                type: 'concept-code',
                title: 'The Player Rig: A Core Concept',
                concept: {
                    rule: '🚫 Rule #1: Don\'t move the camera directly!',
                    why: 'The WebXR system constantly updates the camera based on head movement. Fighting it causes jitter.',
                    solution: 'The "Player Rig" - Create a parent THREE.Group, add camera and controllers to it, move the entire rig.'
                },
                code: `// Conceptual Code
const playerRig = new THREE.Group();
scene.add(playerRig);

// Add camera and controllers to the rig
playerRig.add(camera);
playerRig.add(controller1);
playerRig.add(controller2);

// Now, to move the player forward:
playerRig.position.z -= 0.1; // Moves the whole setup!`
            },

            // Slide 8: Listening to Controller Input
            {
                type: 'concept-code',
                title: 'Listening to Controller Input',
                concept: {
                    description: 'WebXR provides XRInputSource objects representing your controllers. We can add event listeners to detect actions.',
                },
                code: `// In your setup code
const controller = renderer.xr.getController(0); // First controller

// Listen for the trigger press
controller.addEventListener('selectstart', onSelectStart);

// Listen for the trigger release
controller.addEventListener('selectend', onSelectEnd);

function onSelectStart() {
    // User squeezed the trigger!
    console.log("Trigger pressed!");
}`
            },

            // Slide 9: Implementing Smooth Locomotion
            {
                type: 'process',
                title: 'Implementing Smooth Locomotion',
                subtitle: 'The Logic (inside your animate or render loop):',
                steps: [
                    {
                        number: '1',
                        title: 'Check Input',
                        desc: 'Check if controller\'s joystick (axes) is being pushed'
                    },
                    {
                        number: '2',
                        title: 'Get Direction',
                        desc: 'Get the direction the controller is pointing'
                    },
                    {
                        number: '3',
                        title: 'Apply Movement',
                        desc: 'Apply that direction to the player rig\'s position'
                    },
                    {
                        number: '4',
                        title: 'Use Delta Time',
                        desc: 'Use delta time for smooth, frame-rate independent movement'
                    }
                ]
            },

            // Slide 10: Smooth Locomotion Code
            {
                type: 'code-focused',
                title: 'Smooth Locomotion - Code Example',
                notes: [
                    'The addScaledVector method is clean for directional movement',
                    'Negative sign used because controller "points" out of screen (negative Z)'
                ],
                code: `// In your animate/render loop
function animate(timestamp, frame) {
    const delta = clock.getDelta(); // Time since last frame

    if (controller.gamepad) { // Check gamepad availability
        const joystickY = controller.gamepad.axes[3]; // Second joystick Y-axis

        if (joystickY < -0.8) { // Joystick pushed forward
            const speed = 2; // meters per second
            const direction = new THREE.Vector3();
            controller.getWorldDirection(direction);

            // Move the player rig
            playerRig.position.addScaledVector(direction, -speed * delta);
        }
    }
    renderer.render(scene, camera);
}`
            },

            // Slide 11: Implementing Teleportation
            {
                type: 'two-step',
                title: 'Implementing Teleportation',
                subtitle: 'This is a two-step process:',
                steps: [
                    {
                        number: '1',
                        title: 'Aiming',
                        description: 'Show the user where they can teleport',
                        details: 'Cast a ray from controller and place marker where it hits the ground'
                    },
                    {
                        number: '2',
                        title: 'Executing',
                        description: 'When user releases button, move player rig',
                        details: 'Move the player rig to the marker\'s position'
                    }
                ]
            },

            // Slide 12: Teleportation - Using Raycaster
            {
                type: 'concept-process',
                title: 'Teleportation - Using a Raycaster',
                concept: 'A THREE.Raycaster lets us shoot a virtual laser beam from a point in a direction to see what it hits.',
                process: [
                    'Create a Raycaster',
                    'Set its origin and direction from the controller',
                    'Check for intersections with "teleportable" surfaces',
                    'If it hits something, show marker at intersection point',
                    'On button release, set playerRig.position to that point'
                ]
            },

            // Slide 13: Teleportation Code
            {
                type: 'code-focused',
                title: 'Teleportation - Code Example',
                code: `const raycaster = new THREE.Raycaster();
const teleportMarker = new THREE.Mesh(...); // A ring or circle mesh
teleportMarker.visible = false;
scene.add(teleportMarker);

// In the animate loop...
function aimTeleport() {
    const origin = controller.position;
    const direction = new THREE.Vector3(0, -1, 0); // Pointing down
    raycaster.set(origin, direction);
    const intersects = raycaster.intersectObjects([floor]);

    if (intersects.length > 0) {
        teleportMarker.visible = true;
        teleportMarker.position.copy(intersects[0].point);
    } else {
        teleportMarker.visible = false;
    }
}

// In your 'selectend' event listener
function onTeleport() {
    if (teleportMarker.visible) {
        playerRig.position.copy(teleportMarker.position);
    }
}`
            },

            // Slide 14: Collision Detection
            {
                type: 'concept',
                title: 'Quick Look: Collision Detection',
                subtitle: 'What stops the user from walking through walls?',
                points: [
                    {
                        icon: '🔧',
                        title: 'Complex Topic',
                        desc: 'Often requires full physics engine (Cannon.js, Rapier)'
                    },
                    {
                        icon: '📦',
                        title: 'Simple Approach',
                        desc: 'Bounding Boxes - Every object inside invisible box (THREE.Box3)'
                    },
                    {
                        icon: '✅',
                        title: 'Check Before Move',
                        desc: 'If playerBox.intersectsBox(wallBox), cancel movement'
                    }
                ]
            },

            // Slide 15: Part 2 Title
            {
                type: 'section',
                title: 'Part 2',
                subtitle: 'General Debugging',
                icon: '🔧'
            },

            // Slide 16: Why is Debugging in VR Hard?
            {
                type: 'problem',
                title: 'Why is Debugging in VR Hard?',
                problems: [
                    {
                        icon: '👀',
                        issue: 'Can\'t see code and VR view simultaneously'
                    },
                    {
                        icon: '🥽',
                        issue: 'Taking headset on/off is slow and tedious'
                    },
                    {
                        icon: '📟',
                        issue: 'Traditional console isn\'t visible in headset'
                    },
                    {
                        icon: '🐛',
                        issue: 'Errors can be subtle visual glitches, not crashes'
                    }
                ]
            },

            // Slide 17: Tool #1 - Browser Console
            {
                type: 'tool',
                title: 'Tool #1: The Browser Console',
                subtitle: 'Your first and best friend!',
                description: 'Use console.log() for everything!',
                examples: [
                    'console.log(\'Player Position:\', playerRig.position);',
                    'console.log(\'Controller Object:\', controller);',
                    'console.log(\'Did my function run?\');'
                ],
                protip: 'Remote Debugging: Use browser\'s remote debugging tools (chrome://inspect) to see console from connected headset like Meta Quest.'
            },

            // Slide 18: Tool #2 - Visual Helpers
            {
                type: 'tool-examples',
                title: 'Tool #2: Three.js Visual Helpers',
                subtitle: 'Don\'t guess where things are. Visualize them!',
                helpers: [
                    {
                        name: 'AxesHelper',
                        code: 'const axesHelper = new THREE.AxesHelper(5);\nscene.add(axesHelper);',
                        description: 'Shows X (red), Y (green), Z (blue) axes. Invaluable for orientation issues.'
                    },
                    {
                        name: 'Box3Helper',
                        code: 'const boxHelper = new THREE.Box3Helper(myObjectBox, 0xffff00);\nscene.add(boxHelper);',
                        description: 'Draws yellow box around object\'s bounding box. Perfect for collision debugging.'
                    },
                    {
                        name: 'GridHelper',
                        code: 'const gridHelper = new THREE.GridHelper(10, 10);\nscene.add(gridHelper);',

                    }
                ]
            },

            // Slide 19: Common Bug #1
            {
                type: 'bug-solution',
                title: 'Common Bug #1',
                bug: '"My object is black!"',
                causes: [
                    {
                        cause: 'No Lights',

            {
                type: 'bug-solution',

            // Slide 21: Common Bug #3

                type: 'bug-detailed',
                title: 'Common Bug #3',
                bug: '"My movement is super fast/jittery!"',
                cause: 'Frame-rate dependent movement. Fixed amount per frame means 90Hz headset moves 50% faster than 60Hz!',

player.position.x += 0.01;

// GOOD: Frame-rate INDEPENDENT
const speed = 1; // 1 unit per second
player.position.x += speed * delta;`

        // DOM Elements
        const slideContainer = document.getElementById('slide-container');
        const slideCounter = document.getElementById('slide-counter');
        const progressBar = document.getElementById('progress');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const slideIndicators = document.getElementById('slide-indicators');

        let currentSlide = 0;
        const totalSlides = slidesData.length;
        const isMobile = window.innerWidth <= 768;

        // Create slide indicators (only on desktop)
        function createIndicators() {
            if (isMobile) return;
            
            for (let i = 0; i < totalSlides; i++) {
                const indicator = document.createElement('div');
                indicator.className = 'w-2 h-8 bg-white/30 rounded cursor-pointer transition-all duration-300 hover:bg-white/50';
                indicator.addEventListener('click', () => goToSlide(i));
                slideIndicators.appendChild(indicator);
            }
        }

        // Generate slide HTML based on type
        function generateSlideHTML(slide) {
            switch (slide.type) {
                case 'title':
                    return `
                        <div class="flex-1 flex items-center justify-center text-center p-6 md:p-12">
                            <div>
                                <div class="vr-icon mx-auto mb-6 md:mb-8 w-12 h-12 md:w-16 md:h-16 text-lg md:text-2xl">🥽</div>
                                <h1 class="text-3xl md:text-6xl font-bold gradient-text mb-3 md:mb-4">${slide.title}</h1>
                                <h2 class="text-xl md:text-4xl font-semibold text-gray-700 mb-4 md:mb-6">${slide.subtitle}</h2>
                                <p class="text-sm md:text-xl text-gray-600 mb-8 md:mb-12">${slide.description}</p>
                                <div class="text-sm md:text-lg text-gray-500">

        // Render all slides
        function renderSlides() {
            slideContainer.innerHTML = '';
            slidesData.forEach((slide, index) => {
                const slideElement = document.createElement('div');
                slideElement.className = 'slide absolute inset-0';
                slideElement.innerHTML = generateSlideHTML(slide);
                slideContainer.appendChild(slideElement);
            });
        }

        // Update slide indicators (only on desktop)
        function updateIndicators() {
            if (isMobile) return;
            
            const indicators = slideIndicators.children;
            for (let i = 0; i < indicators.length; i++) {
                indicators[i].className = i === currentSlide 
                    ? 'w-2 h-8 bg-white rounded cursor-pointer transition-all duration-300'
                    : 'w-2 h-8 bg-white/30 rounded cursor-pointer transition-all duration-300 hover:bg-white/50';
            }
        }

        // Update progress and controls
        function updateUI() {
            const progress = ((currentSlide + 1) / totalSlides) * 100;
            progressBar.style.width = `${progress}%`;
            slideCounter.textContent = `${currentSlide + 1} / ${totalSlides}`;
            prevBtn.disabled = currentSlide === 0;
            nextBtn.disabled = currentSlide === totalSlides - 1;
            updateIndicators();
        }

        // Show specific slide
        function showSlide(index) {
            const slides = slideContainer.children;
            for (let i = 0; i < slides.length; i++) {
                slides[i].classList.remove('active');
            }
            if (slides[index]) {
                slides[index].classList.add('active');
            }
            currentSlide = index;
            updateUI();
            // Trigger Prism.js to highlight code
            setTimeout(() => Prism.highlightAll(), 100);
        }

        // Navigation functions
        function nextSlide() {
            if (currentSlide < totalSlides - 1) {
                showSlide(currentSlide + 1);
            }
        }

        function prevSlide() {
            if (currentSlide > 0) {
                showSlide(currentSlide - 1);
            }
        }

        function goToSlide(index) {
            if (index >= 0 && index < totalSlides) {
                showSlide(index);
            }
        }

        // Event listeners
        nextBtn.addEventListener('click', nextSlide);
        prevBtn.addEventListener('click', prevSlide);

        document.addEventListener('keydown', (e) => {
            // Prevent keyboard navigation on mobile when virtual keyboard might be open
            if (isMobile && (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA')) {
                return;
            }
            
            if (e.key === 'ArrowRight' || e.key === ' ') {
                e.preventDefault();
                nextSlide();
            } else if (e.key === 'ArrowLeft') {
                e.preventDefault();
                prevSlide();
            } else if (e.key === 'Home') {
                e.preventDefault();
                goToSlide(0);
            } else if (e.key === 'End') {
                e.preventDefault();
                goToSlide(totalSlides - 1);
            }
        });

        // Touch/swipe support with improved mobile handling
        let touchStartX = 0;
        let touchStartY = 0;
        let isSwiping = false;
        
        slideContainer.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
            isSwiping = false;
        }, { passive: true });

        slideContainer.addEventListener('touchmove', (e) => {
            if (!touchStartX || !touchStartY) return;
            
            const touchX = e.touches[0].clientX;
            const touchY = e.touches[0].clientY;
            const diffX = touchStartX - touchX;
            const diffY = touchStartY - touchY;
            
            // Only prevent default if horizontal swipe is more significant than vertical
            if (Math.abs(diffX) > Math.abs(diffY) && Math.abs(diffX) > 20) {
                e.preventDefault();
                isSwiping = true;
            }
        }, { passive: false });

        slideContainer.addEventListener('touchend', (e) => {
            if (!touchStartX || !isSwiping) return;
            
            const touchEndX = e.changedTouches[0].clientX;
            const diff = touchStartX - touchEndX;
            
            // Minimum swipe distance
            if (Math.abs(diff) > 50) {
                if (diff > 0) {
                    nextSlide();
                } else {
                    prevSlide();
                }
            }
            
            touchStartX = 0;
            touchStartY = 0;
            isSwiping = false;
        }, { passive: true });

        // Initialize
        createIndicators();
        renderSlides();
        showSlide(0);
    </script>
